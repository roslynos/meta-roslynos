name: Release

on:
  push:
    branches: 
    - main
    
jobs:
  machine-matrix:
    runs-on: self-hosted

    strategy:
      fail-fast: false
      
    steps:
      - name: Clone repository
        uses: actions/checkout@v3

      - name: Clone required dependencies
        run: ./repo-mgr.sh init
      
      - name: Source build environment
        run:  source ./poky/oe-init-build-env build
      
      - name: Build Yocto images
        run:  |
          source ./poky/oe-init-build-env build
          MACHINE='raspberrypi3-64' bitbake dotnet-image-minimal --dry-run
          MACHINE='raspberrypi3-64' bitbake dotnet-image-full --dry-run
          MACHINE='raspberrypi4-64' bitbake dotnet-image-minimal --dry-run
          MACHINE='raspberrypi4-64' bitbake dotnet-image-full --dry-run
          MACHINE='reterminal-64' bitbake dotnet-image-minimal --dry-run
          MACHINE='reterminal-64' bitbake dotnet-image-full --dry-run
        
      - name: Create the package index
        run:  bitbake package-index
        
      - name: Disk space report after build
        run: |
          echo "Memory and swap:"
          free
          echo
          swapon --show
          echo
          echo "Available storage:"
          df -h
          echo
          
