name: Release

on:
  push:
    branches: 
    - main
    
jobs:
  machine-matrix:
    runs-on: self-hosted

    strategy:
      fail-fast: false
      
    steps:
      - name: Clone repository
        uses: actions/checkout@v3  
        
      - name: Disk space report after build
        run: |
          echo "Memory and swap:"
          free
          echo
          swapon --show
          echo
          echo "Available storage:"
          df -h
          echo
